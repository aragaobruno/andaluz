services:
  # ---------------------------------------------------------
  # TEMPORAL STACK
  # ---------------------------------------------------------
  temporal-db:
    image: postgres:16-alpine
    container_name: andaluz-temporal-db
    environment:
      - POSTGRES_DB=temporal
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
    volumes:
      - andaluz-db-data:/var/lib/postgresql/data
    networks:
      - andaluz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.24
    container_name: andaluz-temporal
    depends_on:
      temporal-db:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
    ports:
      - "7233:7233"   # gRPC Endpoint
    networks:
      - andaluz-network
    healthcheck:
      test: ["CMD-SHELL", "temporal --address $$HOSTNAME:7233 workflow list"]
      interval: 10s
      timeout: 5s
      retries: 10

  temporal-ui:
    image: temporalio/ui:latest
    container_name: andaluz-temporal-ui
    ports:
      - "8088:8080"   # Web UI
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8088
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - andaluz-network

  # ---------------------------------------------------------
  # LITELLM PROXY (Model Gateway / Router)
  # ---------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: andaluz-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    command: ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]
    networks:
      - andaluz-network
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness')\""]
      interval: 5s
      timeout: 5s
      retries: 20

  # ---------------------------------------------------------
  # PYTHON TEMPORAL WORKER
  # ---------------------------------------------------------
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile.dev
    container_name: andaluz-worker
    volumes:
      - ./worker:/app
      - ./test_claim.py:/app/test_claim.py
    environment:
      - TEMPORAL_HOST=temporal:7233
      - LITELLM_API_BASE=http://litellm:4000/v1
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    depends_on:
      temporal:
        condition: service_healthy
      litellm:
        condition: service_healthy
    networks:
      - andaluz-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: andaluz-api
    ports:
      - "8000:8000"
    environment:
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - TASK_QUEUE=andaluz-tasks
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - andaluz-network

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: andaluz-ui
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - andaluz-network

networks:
  andaluz-network:
    name: andaluz-network

volumes:
  andaluz-db-data:
